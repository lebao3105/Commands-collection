name: New release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version
        type: string
        required: true
      prerelease:
        description: Prerelease
        type: boolean
        required: true

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout the source code
        uses: actions/checkout@v6
        with:
          path: CC

      - name: Install compiler
        uses: gcarreno/setup-lazarus@v3.4.1
        with:
          with-cache: true

      - name: Setup XMake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest
          actions-cache-folder: '.xmake-cache'
          actions-cache-key: ${{ matrix.os }}
          build-cache: true # We don't need it, but just in case
          build-cache-path: 'build/.build_cache'

      - name: Build
        run: |
          xmake f -m release
          xmake b -v
        working-directory: CC
        env:
          TARGET: ${{ matrix.prog }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          path: CC/build/*
          if-no-files-found: error
          name: CC Release for ${{ matrix.os }}

  publish:
    runs-on: ubuntu-latest

    needs: build

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v7

      - name: Publish
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: ${{ github.event.inputs.version }}
          prerelease: ${{ github.event.inputs.prerelease }}
          draft: true
          body_path: ${{ github.workspace }}/changelogs/${{ github.event.inputs.version }}.md
          files: "CC Release*"
          name: v${{ github.event.inputs.version }}
