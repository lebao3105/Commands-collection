name: Nightly CI

on:
  push:
    paths:
      - "*/**.pp"
      - "*/**.inc"
      - "*/**.c"
      - "*/**.h"
      - ".github/workflows/nightly.yml"

  pull_request:
    branches:
      - "main"
    paths:
      - "*/**.pp"
      - "*/**.inc"
      - "*/**.c"
      - "*/**.h"
      - ".github/workflows/nightly.yml"

  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout the source code
        uses: actions/checkout@v6
        with:
          path: CC

      - name: Install compiler
        uses: gcarreno/setup-lazarus@v3.4.1
        with:
          with-cache: true

      - name: Setup XMake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest
          actions-cache-folder: '.xmake-cache'
          actions-cache-key: ${{ matrix.os }}
          build-cache: true # We don't need it, but just in case
          build-cache-path: 'build/.build_cache'

      - name: Build
        run: |
          xmake f -m debug
          xmake b -v
        working-directory: CC

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with: # FIXME: build? not build/<os>/<arch>/<variant>?
          path: CC/build/
          if-no-files-found: error
          name: CC Nightly for ${{ matrix.os }}
